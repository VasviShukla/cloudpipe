version: '3.8'

services:
  api:
    build: .
    container_name: cloudpipe-api
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - APP_VERSION=1.0.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - cloudpipe-network

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: cloudpipe-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - cloudpipe-network

networks:
  cloudpipe-network:
    driver: bridge
